# Supabase PostgreSQL Configuration
# Copy this file to application.properties and fill in your Supabase credentials
# Or set environment variables:
#   DATABASE_URL=jdbc:postgresql://<project>.supabase.co:5432/postgres?user=<user>&password=<password>&sslmode=require
#   JWT_SECRET=<your-secret>
#   FRONTEND_URL=https://<your-app>.vercel.app
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Supabase SSL
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# JWT
fleet.jwt.secret=${JWT_SECRET}
fleet.jwt.expiration=86400000

# Server
server.port=${PORT:8080}

# CORS - Frontend on Vercel
fleet.frontend-url=${FRONTEND_URL:https://fleet-management.vercel.app}
