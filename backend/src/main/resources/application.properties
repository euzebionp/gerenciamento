# Database Settings (PostgreSQL - Supabase)
# Use DATABASE_URL environment variable for Supabase connection
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/fleet_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Settings
fleet.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
fleet.jwt.expiration=86400000

# Server Settings
server.port=${PORT:8080}
server.servlet.context-path=

# CORS - Frontend URL (production)
fleet.frontend-url=${FRONTEND_URL:http://localhost:4200}
